name: Main

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: 24

jobs:
  test:
    name: Sanity check
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate JSON configs parse
        run: |
          for f in packages/prettier/index.json packages/oxc/oxlint.json packages/oxc/oxfmt.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
          done

      - name: Validate JS/MJS config syntax
        run: |
          node --check packages/oxc/oxlint.js
          node --check packages/oxc/oxfmt.js
          node --check packages/eslint/index.mjs
          node --check packages/eslint/base.mjs
          node --check packages/eslint/jest.mjs
          node --check packages/eslint/react.mjs

  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [test]
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          commit: 'Publish packages'
          title: 'Publish packages'
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
